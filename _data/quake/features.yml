- label: Persistent Corpses
  description: Player corpses stick around for a bit before disappearing
  image: corpse.jpg

- label: No Autoswitch
  description: Picking up new weapons won't autoswitch anymore
  image: noauto.jpg

- label: Visible Weapons
  description: Force weapons to drop visibly outside the backpack
  image: visible.jpg

- label: Nail Speed
  description: Make nails travel instantly, like a gun instead of a water hose
  image: hitscan.jpg

- label: Melee Attacks
  description: Perform a melee attack w/out switching weapons
  image: melee.jpg

- label: Hand Grenades
  description: Toss a hand grenade down the hall w/out switching weapons
  image: grenades.jpg

- label: Custom Loadouts
  description: Replace every weapon and ammo crate in the game w/ what you want
  image: custom.jpg

- label: Killing Spree
  description: Game announces when you're on a killstreak and when it ends
