- label: Multiplayer Bots
  description: Add robot players to deathmatch, teamplay, and coop games
  image: bots1.jpg

- label: Blood & Gore
  description: Bathe in the blood of your enemies w/ scalable gore setting
  image: gore1.jpg

- label: Copper Tweaks
  description: All the vanilla improvements from <a href="http://lunaran.com/copper/" target="_blank">Copper</a> mod (v1.20)
  image: copper.jpg

- label: Perfect Balance
  description: Find the perfect balance w/ configurable weapons
  image: balance.jpg

- label: Item Resupply
  description: Force items to respawn in singleplayer and coop games
  image: resupply.jpg

- label: Name Tags
  description: See other player names Halo-style when aiming at them
  image: nametags.jpg

- label: Foot Steps
  description: Hear your boots touch the ground as you stalk your prey
  image: footsteps.jpg

- label: Score Keeper
  description: Make teamplay games combine scores to achieve fraglimit
  image: teamscore.jpg

- label: Death Timeout
  description: When you die you have to sit out until mandatory delay is over
